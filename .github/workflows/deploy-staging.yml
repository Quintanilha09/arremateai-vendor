name: Deploy to Render Staging

# Trigger deploy on Render after Docker Publish succeeds on main.
# Render pulls the latest image from GHCR and restarts the service.
on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Render deploy
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID secrets"
            exit 1
          fi

          echo "Triggering Render deploy for service $RENDER_SERVICE_ID"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy triggered (HTTP $HTTP_CODE)"
            DEPLOY_ID=$(echo "$BODY" | grep -oE '"id":"dep-[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Deploy ID: $DEPLOY_ID"
            echo "Watch: https://dashboard.render.com/web/$RENDER_SERVICE_ID"
          else
            echo "Deploy trigger failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
