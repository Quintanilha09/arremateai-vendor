server.port=8084
spring.application.name=arremateai-vendor

# Database - shared PostgreSQL during migration
spring.datasource.url=jdbc:postgresql://localhost:5433/arremateai
spring.datasource.username=${DB_USERNAME:arremateai}
spring.datasource.password=${DB_PASSWORD:arremateai123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Multipart (documents up to 10MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Document storage
app.vendor.storage-location=./uploads/documentos
app.vendor.base-url=${VENDOR_BASE_URL:http://localhost:8084}

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:noreply@arremateai.com}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# 2FA / Verification code
app.2fa.code-expiration-minutes=10
app.2fa.from-email=${EMAIL_USERNAME:noreply@arremateai.com}

# Admin notifications
app.admin.email=${ADMIN_EMAIL:admin@arremateai.com}
app.frontend.url=http://localhost:3000

# Actuator
management.endpoints.web.exposure.include=health

management.health.mail.enabled=false
