server:
  port: 8083

spring:
  application:
    name: arremateai-vendor

  # Database - shared PostgreSQL during migration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:arremateai}
    username: ${DB_USERNAME:arremateai}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA (E16-H7: ddl-auto=validate — schema gerido pelo Flyway)
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway (E16-H7): tabela de historico dedicada ao vendor no banco compartilhado
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_vendor
    baseline-on-migrate: true
    baseline-version: 0

  # Multipart (documents up to 10MB)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

  # Email (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:noreply@arremateai.com}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# Document storage
app:
  vendor:
    storage-location: ./uploads/documentos
    base-url: ${VENDOR_BASE_URL:http://localhost:8083}
  2fa:
    code-expiration-minutes: 10
    from-email: ${EMAIL_USERNAME:noreply@arremateai.com}
  admin:
    email: ${ADMIN_EMAIL:admin@arremateai.com}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

# Gateway security
gateway:
  secret-header: X-Gateway-Secret
  secret-value: ${GATEWAY_SECRET}
