server:
  port: 0

spring:
  application:
    name: arremateai-vendor-test

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_vendor
    baseline-on-migrate: true
    baseline-version: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

  mail:
    host: localhost
    port: 25
    test-connection: false

app:
  vendor:
    storage-location: ./uploads/documentos-test
    base-url: http://localhost:0
  2fa:
    code-expiration-minutes: 10
    from-email: noreply@test.local
  admin:
    email: admin@test.local
  frontend:
    url: http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false

gateway:
  secret-header: X-Gateway-Secret
  secret-value: ""
